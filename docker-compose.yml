services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: intellipulse-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: intellipulse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: intellipulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
